name: CD
on:
  push:
    branches:
      - master

jobs:
  publish-to-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: "typescript"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          # for npm-version-to-git
          fetch-depth: 0
      - uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b
        with:
          enable_kvm: true
          extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"
      # Feel free to substitute in a fork
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        if: |
          ! (github.triggering_actor == 'dependabot[bot]' && github.repository_owner == 'anteriorcore')
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - uses: nicknovitski/nix-develop@5da6ac475f1ffbcf54ee562fa3056646e146be95
      - run: |
          npm config set registry https://registry.npmjs.org
      - run: npm ci
      - run: npm-version-to-git
      - run: |
          printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\n' > ~/.npmrc
      - run: npm run build
      - run: npm publish --access public --provenance
