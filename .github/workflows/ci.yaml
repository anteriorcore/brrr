on:
  push:

name: CI
jobs:
  nocommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: "nocommit checker"
        uses: nobssoftware/nocommit@5c3cf9519fe40b80b0954d254085b67b532a5dc3

  nix-flake-check:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15
        with:
          enable_kvm: true
          extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"
      # Feel free to substitute in a fork
      - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c
        if: |
          ! (github.triggering_actor == 'dependabot[bot]' && github.repository_owner == 'anteriorcore')
        with:
          name: anterior-public
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - run: |
          nix profile install github:anteriorcore/tools/ba480909a9b3cf9c7e763fa604428d251c114789#nix-flake-check-changed
      - run: |
          nix-flake-check-changed

  # Ensure nix flake show isn’t broken
  nix-flake-show:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: nixbuild/nix-quick-install-action@c57091870f58910a7aef53a0b0a99f6ba568aa6f
      # No need for a cache
      - run: nix flake show
